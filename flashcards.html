<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Vietnamese</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 2'><rect width='3' height='2' fill='%23DA251D'/><polygon fill='%23FFFF00' points='1.5,0.38 1.672,0.918 2.243,0.918 1.786,1.246 1.957,1.784 1.5,1.456 1.043,1.784 1.214,1.246 0.757,0.918 1.328,0.918'/></svg>">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#07090f">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07090f;
      --card-bg:   #101425;
      --card-bg2:  #131830;
      --border:    rgba(160, 130, 58, 0.2);
      --gold:      #c4a245;
      --gold-dim:  rgba(196, 162, 69, 0.3);
      --text:      rgba(215, 220, 238, 0.88);
      --text-dim:  rgba(170, 178, 210, 0.38);
      --red-lo:    #6a1515;  --red-hi:  #b83030;  --red-glow:  rgba(184,48,48,0.32);
      --yel-lo:    #5a4400;  --yel-hi:  #b89500;  --yel-glow:  rgba(184,149,0,0.28);
      --grn-lo:    #0a3d20;  --grn-hi:  #228a4a;  --grn-glow:  rgba(34,138,74,0.3);
      --blue:      #5ba8e0;  --blue-dim: rgba(91,168,224,0.3);
      --bat-empty: rgba(255,255,255,0.04);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 64px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 45%, rgba(25,38,80,0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── stage ── */
    .stage {
      display: flex;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 1;
      transform-origin: center center;
      transition: transform 0.15s;
    }

    .card-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* ── top-row boxes ── */
    .top-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      height: 52px;
      flex-shrink: 0;
      gap: 9px;
    }

    /* ── counter ── */
    .counter {
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ── card ── */
    .card {
      width: 840px;
      height: 520px;
      background: linear-gradient(160deg, var(--card-bg2) 0%, var(--card-bg) 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      display: grid;
      grid-template-rows: 1fr 1px 1fr;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 12px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.03);
      position: relative;
    }
    .card::before, .card::after, .card .c-bl, .card .c-br {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--gold-dim);
      border-style: solid;
      pointer-events: none;
      z-index: 2;
    }
    .card::before { top:14px;    left:14px;  border-width: 1px 0 0 1px; }
    .card::after  { top:14px;    right:14px; border-width: 1px 1px 0 0; }
    .card .c-bl   { bottom:14px; left:14px;  border-width: 0 0 1px 1px; }
    .card .c-br   { bottom:14px; right:14px; border-width: 0 1px 1px 0; }

    .card-top, .card-bot {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 60px;
    }
    .card-divider { background: rgba(255,255,255,0.055); width: 100%; }

    .word {
      font-size: 90px;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.15;
      text-align: center;
      color: var(--text);
    }
    .word-en.hidden { opacity: 0; }

    .seg { cursor: default; }
    .seg:hover {
      text-decoration: underline;
      text-decoration-color: rgba(196,162,69,0.55);
      text-decoration-skip-ink: none;
    }

    #seg-tip {
      position: fixed;
      background: rgba(7,9,18,0.96);
      border: 1px solid rgba(160,130,58,0.38);
      border-radius: 6px;
      padding: 5px 11px;
      font-size: 13px;
      font-family: 'Be Vietnam Pro', sans-serif;
      color: rgba(215,220,238,0.9);
      pointer-events: none;
      opacity: 0;
      z-index: 1000;
      white-space: nowrap;
      transform: translate(-50%, -100%);
      box-shadow: 0 4px 18px rgba(0,0,0,0.55);
      transition: opacity 0.08s;
    }
    #seg-tip.visible { opacity: 1; }
    #seg-tip.locked  { transform: translate(-50%, 0); }

    /* ── nav ── */
    .nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 840px;
      gap: 14px;
    }
    .nav-left   { display: flex; }
    .nav-center { display: flex; gap: 14px; }
    .nav-right  { display: flex; justify-content: flex-end; }

    .nav-btn {
      height: 52px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: none;
    }
    .nav-btn.arrow { width: 72px; font-size: 22px; }
    .nav-btn.side  { padding: 0 18px; font-size: 14px; white-space: nowrap; }
    .nav-btn:disabled { opacity: 0.18; cursor: default; }

    /* ── battery column ── */
    .battery-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .battery {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bat-cap {
      width: 22px; height: 8px;
      border-radius: 3px 3px 0 0;
      margin-bottom: 3px;
    }
    .bat-body {
      width: 44px;
      border: 2px solid;
      border-radius: 4px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: rgba(0,0,0,0.35);
      transition: none;
    }
    .bat-cell {
      width: 100%;
      height: 38px;
      border-radius: 3px;
      background: var(--bat-empty);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .bat-cell:hover { border-color: rgba(255,255,255,0.22); }
    .bat-cell.lit-red,    .mini-bat-cell-h.lit-red    { background: linear-gradient(180deg, var(--red-hi) 0%, var(--red-lo) 100%); border-color: rgba(184,48,48,0.55); box-shadow: 0 0 5px var(--red-glow), inset 0 1px 0 rgba(255,100,90,0.15); }
    .bat-cell.lit-yellow, .mini-bat-cell-h.lit-yellow { background: linear-gradient(180deg, var(--yel-hi) 0%, var(--yel-lo) 100%); border-color: rgba(184,149,0,0.55); box-shadow: 0 0 5px var(--yel-glow), inset 0 1px 0 rgba(255,220,60,0.15); }
    .bat-cell.lit-green,  .mini-bat-cell-h.lit-green  { background: linear-gradient(180deg, var(--grn-hi) 0%, var(--grn-lo) 100%); border-color: rgba(34,138,74,0.55); box-shadow: 0 0 5px var(--grn-glow), inset 0 1px 0 rgba(80,255,140,0.1); }

    /* ── link button ── */
    .link-btn {
      width: 44px; height: 34px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: none;
      outline: none;
    }
    .link-btn:disabled { opacity: 0.2; cursor: default; }

    /* ── top row (slider + counter) ── */
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 840px;
      margin-bottom: 4px;
    }
    .slider-label {
      font-size: 13px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      min-width: 28px;
    }

    /* ── dual range slider ── */
    .dual-slider {
      position: relative;
      width: 160px;
      height: 28px;
      flex-shrink: 0;
    }
    .dual-slider .track-bg {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .dual-slider .track-fill {
      position: absolute;
      top: 50%;
      height: 3px;
      background: var(--blue-dim);
      border-radius: 2px;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .dual-slider input[type=range] {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      height: 100%;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      pointer-events: none;
      margin: 0;
    }
    .dual-slider input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--blue);
      border: 2px solid var(--bg);
      cursor: pointer;
      pointer-events: all;
      box-shadow: 0 0 5px rgba(91,168,224,0.4);
    }
    .dual-slider input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--blue);
      border: 2px solid var(--bg);
      cursor: pointer;
      pointer-events: all;
    }

    /* ── word list overlay ── */
    .wl-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,7,14,0.94);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.14s;
    }
    .wl-overlay.visible { opacity: 1; pointer-events: all; }

    .wl-panel {
      width: 720px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      background: var(--card-bg2);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,0.7);
    }

    .wl-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .sort-btns { display: flex; gap: 6px; }
    .sort-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 12px;
      font-family: 'Be Vietnam Pro', sans-serif;
      padding: 5px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sort-btn.primary { color: var(--text); border-color: rgba(160,130,58,0.4); }
    .sort-arrow { font-size: 10px; }
    .sort-arrow.dirty { opacity: 0.2; }

    .wl-cls-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 12px;
      font-family: 'Be Vietnam Pro', sans-serif;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .close-wl-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 15px;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .filter-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 2px; }
    .filter-chip {
      width: 32px; height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-family: 'Be Vietnam Pro', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .filter-chip.on { border-color: rgba(160,130,58,0.4); color: var(--text); background: rgba(160,130,58,0.1); }
    .filter-count { margin-left: auto; font-size: 11px; color: var(--text-dim); }

    /* column headers */
    .wl-col-headers {
      display: grid;
      grid-template-columns: 1fr 1fr auto 28px auto;
      gap: 8px;
      padding: 8px 20px 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .wl-col-score { text-align: center; }

    /* word list */
    .wl-content { overflow-y: auto; flex: 1; padding: 6px 20px 20px; }
    .wl-content::-webkit-scrollbar { width: 5px; }
    .wl-content::-webkit-scrollbar-track { background: transparent; }
    .wl-content::-webkit-scrollbar-thumb { background: rgba(91,168,224,0.2); border-radius: 3px; }
    .wl-content::-webkit-scrollbar-thumb:hover { background: rgba(91,168,224,0.4); }

    .word-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto 28px auto;
      align-items: center;
      gap: 8px;
      padding: 6px 0 6px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;
      border-radius: 4px;
    }
    .word-row:hover { background: rgba(255,255,255,0.02); }
    .word-row-viet  { font-size: 18px; font-weight: 400; }
    .word-row-en    { font-size: 18px; font-weight: 400; color: var(--text); }

    /* ── horizontal mini-battery ── */
    .mini-bat-h { display: flex; align-items: center; }
    .mini-bat-body-h {
      display: flex;
      flex-direction: row;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      padding: 2px;
      gap: 2px;
      background: rgba(0,0,0,0.3);
    }
    .mini-bat-cell-h {
      width: 9px;
      height: 13px;
      border-radius: 2px;
      background: var(--bat-empty);
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    }
    .mini-bat-cell-h:hover { border-color: rgba(255,255,255,0.2); }
    .mini-bat-cap-h {
      width: 4px; height: 8px;
      border-radius: 0 2px 2px 0;
      margin-left: 2px;
    }

    /* ── word list link button ── */
    .wl-link-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px;
      border-radius: 4px;
      width: 28px; height: 28px;
    }
    .wl-link-btn:hover:not(:disabled) { background: rgba(255,255,255,0.05); }
    .wl-link-btn:disabled { opacity: 0.18; cursor: default; }

    /* ── segmented controls (region / formality) ── */
    .top-row-right { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .seg-ctrl { display: inline-flex; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; flex-shrink: 0; }
    .seg-seg {
      position: relative;
      padding: 0 16px;
      height: 52px;
      background: var(--card-bg);
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 13px;
      font-family: 'Be Vietnam Pro', sans-serif;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .seg-seg:last-child { border-right: none; }
    .seg-seg:first-child { border-radius: 11px 0 0 11px; }
    .seg-seg:last-child  { border-radius: 0 11px 11px 0; }
    .seg-ctrl .seg-seg:only-child { border-radius: 11px; }
    .seg-seg.active { box-shadow: inset 0 0 0 1.5px var(--blue); color: var(--text); }
    .seg-ctrl-sm .seg-seg { height: 28px; padding: 0 10px; font-size: 12px; }
    .seg-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      flex-shrink: 0;
    }
    .seg-dot.visible { opacity: 1; }
    .nav-btn.mode-on { color: var(--gold); border-color: rgba(196,162,69,0.4); }

    /* ── word list col headers (clickable) ── */
    .wl-col-hdr { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 3px; }
    .wl-col-hdr:hover { color: var(--text); }
    .wl-col-hdr.primary { color: var(--text); }

    /* ── mobile layout ──
       Phone status bar / gesture bar cover the screen edges, so pad with
       safe-area insets and anchor content to the top (a centered flex body
       clips BOTH ends when content overflows). Exactly two rows above the
       card and two below it, plus the battery strip. */
    @media (max-width: 700px) {
      body {
        padding: calc(14px + env(safe-area-inset-top, 0px)) 10px calc(28px + env(safe-area-inset-bottom, 0px));
        justify-content: flex-start;
        overflow-y: auto;
      }
      .stage { flex-direction: column; width: 100%; gap: 8px; }
      .card-col { display: contents; }   /* let stage order card-col children directly */
      /* top row 1: [slider | counter]   top row 2: [N/C/S | Formal/Informal] */
      .top-row { order: 1; width: 100%; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 0; }
      .top-box { height: 38px; padding: 0 10px; }
      .top-row > .top-box:first-child { flex: 1 1 auto; justify-content: center; }
      .top-row .seg-ctrl { flex: 1 1 42%; display: flex; }
      .top-row .seg-seg { flex: 1; justify-content: center; min-width: 0; }
      .seg-seg { height: 38px; padding: 0 6px; font-size: 11px; }
      /* card gets whatever height the fixed rows leave over */
      .card { order: 2; width: 100%; height: clamp(220px, calc(100dvh - 350px), 430px); border-radius: 16px; }
      .card-top, .card-bot { padding: 14px 12px; }
      .word { font-size: 40px; }
      /* battery: vertical side column → horizontal strip under the card */
      .battery-col { order: 3; width: 100%; flex-direction: row; justify-content: center; gap: 12px; }
      .battery { flex-direction: row-reverse; align-items: center; flex: 1; max-width: 320px; }
      .bat-cap { width: 7px; height: 20px; border-radius: 0 3px 3px 0; margin: 0 0 0 3px; }
      .bat-body { flex-direction: row-reverse; width: 100%; padding: 3px; gap: 3px; }
      .bat-cell { height: 28px; flex: 1; }
      /* bottom row 1: [◀ | shuffle | ▶]   bottom row 2: [Classifier | V→E | View All Words] */
      .nav { order: 4; width: 100%; display: flex; flex-wrap: wrap; gap: 8px; }
      .nav-center { order: -1; flex-basis: 100%; gap: 8px; }
      .nav-center .nav-btn.arrow { flex: 1; width: auto; height: 46px; }
      .nav-left { flex: 1; }
      .nav-right { flex: 2; }
      .nav-left .nav-btn, .nav-right .nav-btn { flex: 1; }
      .nav-btn.side { height: 42px; font-size: 12px; padding: 0 6px; }
      /* word list overlay: full screen (Import/Export live in its header) */
      .wl-panel { width: 100vw; height: 100dvh; max-height: none; border-radius: 0; }
      .wl-header { gap: 6px; padding: calc(10px + env(safe-area-inset-top, 0px)) 12px 10px; }
      .wl-col-headers, .word-row { grid-template-columns: 1fr 1fr auto 24px auto; }
      .wl-col-headers { padding: 6px 12px 4px; }
      .wl-content { padding: 4px 12px calc(16px + env(safe-area-inset-bottom, 0px)); }
      .word-row-viet, .word-row-en { font-size: 15px; }
    }
  </style>
</head>
<body>

<div class="stage" id="stage">
  <div class="card-col">
    <div class="top-row">
      <div class="top-box">
        <div class="dual-slider" id="studySlider">
          <div class="track-bg"></div>
          <div class="track-fill" id="sliderFill"></div>
          <input type="range" id="sliderMin" min="0" max="5" value="0" step="1">
          <input type="range" id="sliderMax" min="0" max="5" value="5" step="1">
        </div>
        <span class="slider-label" id="sliderLabel">0 – 5</span>
      </div>
      <div class="counter top-box" id="counter"></div>
      <div class="seg-ctrl">
        <button class="seg-seg active" id="regionN" onclick="setRegion('north')">North<span class="seg-dot" id="dotN"></span></button>
        <button class="seg-seg" id="regionC" onclick="setRegion('central')">Central<span class="seg-dot" id="dotC"></span></button>
        <button class="seg-seg" id="regionS" onclick="setRegion('south')">South<span class="seg-dot" id="dotS"></span></button>
      </div>
      <div class="seg-ctrl">
        <button class="seg-seg active" id="formalF" onclick="setFormality('formal')">Formal<span class="seg-dot" id="dotFormal"></span></button>
        <button class="seg-seg" id="formalI" onclick="setFormality('informal')">Informal<span class="seg-dot" id="dotInformal"></span></button>
      </div>
    </div>

// ─── state ────────────────────────────────────────────────────────────────────
let scores        = {};
let unlinkedWords = new Set();   // viet keys of words explicitly unlinked
let classifiersOn = false;

let deck     = [];
let deckPos  = 0;
let deckOrder = [];   // persistent shuffled permutation of all word indices
let deckFilter = new Set([0,1,2,3,4,5]);
let scoreA = 0; // left handle — always on top when stacked
let scoreB = 5; // right handle
let revealed = false;
let currentRegion    = 'north';    // 'north' | 'central' | 'south'
let currentFormality = 'formal';   // 'formal' | 'informal'
let reverseMode      = false;      // false = V→E, true = E→V

// sort: primary key, per-key dirs, stable cached list (not re-sorted on cls toggle)
let sortPrimary = 'score';
let sortDirs    = { score:'desc', 'alpha-viet':'asc', 'alpha-en':'asc', 'score-cls':'desc' };
let cachedList  = [];   // stable word list used for rendering; only rebuilt on sort click

const ZOOM_LEVELS = [0.7, 0.8, 0.9, 1.0, 1.1, 1.2, 1.3];
let zoomIdx = 3;

// ─── score helpers ────────────────────────────────────────────────────────────
// A word is "linked" if it has no classifier, OR has a classifier but is not in unlinkedWords.
// Linked  → always use base key (same score both modes)
// Unlinked → use _c key when classifiersOn
function isLinked(w) { return !w.classifier || !unlinkedWords.has(w.viet); }

function scoreKey(w, forceClassifier) {
  const useClassifier = forceClassifier !== undefined ? forceClassifier : classifiersOn;
  const base = reverseMode ? w.viet + "_r"  : w.viet;
  const cls  = reverseMode ? w.viet + "_rc" : w.viet + "_c";
  if (!w.classifier) return base;   // no classifier → always base
  if (isLinked(w))   return base;   // linked        → always base
  return useClassifier ? cls : base; // unlinked     → mode-specific
}

function scoreOf(w, forceClassifier) { return scores[scoreKey(w, forceClassifier)] ?? 0; }
function currentScore()              { return scoreOf(words[deck[deckPos]]); }

function setScore(v) {
  v = ((v % 6) + 6) % 6;
  const w = words[deck[deckPos]];
  if (v === scoreOf(w)) return;
  scores[scoreKey(w)] = v;
  saveScores();
  renderBattery();
}

// ─── persistence ──────────────────────────────────────────────────────────────
function loadAll() {
  try { const s = localStorage.getItem("viet-v1-scores");  if (s) scores = JSON.parse(s); } catch(e) {}
  words.forEach(w => {
    if (scores[w.viet]         === undefined) scores[w.viet]         = w.defaultScore ?? 0;
    if (scores[w.viet + "_c"]  === undefined) scores[w.viet + "_c"]  = w.defaultScore ?? 0;
    if (scores[w.viet + "_r"]  === undefined) scores[w.viet + "_r"]  = w.defaultScore ?? 0;
    if (scores[w.viet + "_rc"] === undefined) scores[w.viet + "_rc"] = w.defaultScore ?? 0;
  });
  try { const u = localStorage.getItem("viet-v1-unlinked"); if (u) unlinkedWords = new Set(JSON.parse(u)); } catch(e) {}
  try {
    const f2 = localStorage.getItem("viet-v2-filter");
    if (f2) { const {min,max} = JSON.parse(f2); scoreA = min; scoreB = max; }
    else {
      const f1 = localStorage.getItem("viet-v1-filter");
      if (f1) { const arr = JSON.parse(f1); scoreA = Math.min(...arr); scoreB = Math.max(...arr); }
    }
    deckFilter = new Set();
    for (let i = Math.min(scoreA,scoreB); i <= Math.max(scoreA,scoreB); i++) deckFilter.add(i);
  } catch(e) {}
  try { const z = localStorage.getItem("viet-v2-zoom"); if (z !== null) zoomIdx = parseInt(z); } catch(e) {}
  try { const r = localStorage.getItem("viet-v1-region");    if (r) currentRegion    = r; } catch(e) {}
  try { const f = localStorage.getItem("viet-v1-formality"); if (f) currentFormality = f; } catch(e) {}
}

function saveScores()   { try { localStorage.setItem("viet-v1-scores",   JSON.stringify(scores));                          } catch(e) {} }
function saveUnlinked() { try { localStorage.setItem("viet-v1-unlinked", JSON.stringify([...unlinkedWords]));             } catch(e) {} }
function saveFilter()   { try { localStorage.setItem("viet-v2-filter",   JSON.stringify({min:scoreA, max:scoreB}));       } catch(e) {} }

// ─── deck ─────────────────────────────────────────────────────────────────────
// deckOrder is a persistent shuffled permutation of every word index. The visible
// deck is that order filtered by score. It's reshuffled only on an explicit shuffle
// or when no valid saved order exists (e.g. first open, or the word list changed) —
// so a saved file opens pre-shuffled without reshuffling on every open.
function shuffleOrder() {
  deckOrder = words.map((_, i) => i);
  for (let i = deckOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deckOrder[i], deckOrder[j]] = [deckOrder[j], deckOrder[i]];
  }
  try { localStorage.setItem("viet-v1-order", JSON.stringify(deckOrder)); } catch(e) {}
}

function loadDeckOrder() {
  let saved = null;
  try { const s = localStorage.getItem("viet-v1-order"); if (s) saved = JSON.parse(s); } catch(e) {}
  if (Array.isArray(saved) && saved.length === words.length) {
    const seen = new Array(words.length).fill(false);
    let ok = true;
    for (const i of saved) {
      if (!Number.isInteger(i) || i < 0 || i >= words.length || seen[i]) { ok = false; break; }
      seen[i] = true;
    }
    if (ok) { deckOrder = saved; return; }
  }
  shuffleOrder();   // no valid saved order → bake a fresh shuffle and persist it
}

function rebuildDeck(shuffle) {
  const currentWordIdx = deck.length ? deck[deckPos] : -1;
  if (shuffle) shuffleOrder();
  deck = deckOrder.filter(i => deckFilter.has(scoreOf(words[i])));
  if (shuffle) {
    deckPos = 0;
  } else {
    const pos = deck.indexOf(currentWordIdx);
    deckPos = pos >= 0 ? pos : 0;
  }
  saveFilter();
}

function shuffleDeck() { rebuildDeck(true); renderCard(); }

// Filter the current deck in-place, preserving order (used by next/prev so shuffle survives).
function filterDeckInPlace() {
  if (!deck.length) return;
  const cur = deck[deckPos];
  deck = deck.filter(i => deckFilter.has(scoreOf(words[i])));
  const pos = deck.indexOf(cur);
  deckPos = pos >= 0 ? pos : Math.min(deckPos, Math.max(0, deck.length - 1));
}

// ─── battery ──────────────────────────────────────────────────────────────────
function batColor(s) {
  if (s <= 2) return { hi:'var(--red-hi)', glow:'0 0 8px var(--red-glow)' };
  if (s <= 4) return { hi:'var(--yel-hi)', glow:'0 0 8px var(--yel-glow)' };
  return              { hi:'var(--grn-hi)', glow:'0 0 8px var(--grn-glow)' };
}

// CSS class for a lit cell at score s (shared by both batteries)
function litClass(s) { return s <= 2 ? 'lit-red' : s <= 4 ? 'lit-yellow' : 'lit-green'; }

function renderBattery() {
  const s    = currentScore();
  const col  = s > 0 ? batColor(s) : null;   // score 0 → neutral, no glow
  const body = document.getElementById("batBody");
  const cap  = document.getElementById("batCap");
  body.innerHTML = "";
  body.style.borderColor = col ? col.hi   : 'rgba(255,255,255,0.14)';
  body.style.boxShadow   = col ? col.glow : 'none';
  cap.style.background   = col ? col.hi   : 'rgba(255,255,255,0.12)';

  for (let i = 5; i >= 1; i--) {
    const cell = document.createElement("div");
    const cls  = i > s ? "" : litClass(s);
    cell.className = "bat-cell" + (cls ? " " + cls : "");
    const ci = i;
    cell.onclick = (e) => { e.stopPropagation(); setScore(currentScore() === ci ? 0 : ci); };
    body.appendChild(cell);
  }
  renderLinkBtn();
}

// ─── link button ──────────────────────────────────────────────────────────────
function renderLinkBtn() {
  if (!deck.length) return;
  const w   = words[deck[deckPos]];
  const btn = document.getElementById("linkBtn");
  if (!w.classifier) {
    btn.innerHTML  = SVG_LINK;
    btn.disabled   = true;
    return;
  }
  btn.disabled = false;
  btn.innerHTML = isLinked(w) ? SVG_LINK : SVG_UNLINK;
}

// Toggle a word's classifier link. Returns true if anything changed.
// Unlink: give the classifier form its own score in BOTH directions (forward
//         _c and reverse _rc), each seeded from its matching base so they start
//         equal. Re-link: drop the overrides — base scores win again per
//         direction, so the now-inert _c/_rc keys are simply ignored.
function applyLinkToggle(w) {
  if (!w.classifier) return false;
  if (isLinked(w)) {
    scores[w.viet + "_c"]  = scores[w.viet]        ?? 0;
    scores[w.viet + "_rc"] = scores[w.viet + "_r"] ?? 0;
    unlinkedWords.add(w.viet);
  } else {
    unlinkedWords.delete(w.viet);
  }
  saveScores();
  saveUnlinked();
  return true;
}

function toggleLink() {
  if (!deck.length) return;
  if (!applyLinkToggle(words[deck[deckPos]])) return;
  renderBattery();
}

// ─── card ─────────────────────────────────────────────────────────────────────
// Shrink a word until it fits its half of the card (long phrases, small screens).
function fitWordEl(el) {
  el.style.fontSize = '';
  const parent = el.parentElement;
  const cs     = getComputedStyle(parent);
  const availH = parent.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
  let size = parseFloat(getComputedStyle(el).fontSize);
  while (size > 16 && (el.scrollHeight > availH || el.scrollWidth > el.clientWidth + 1)) {
    size = Math.floor(size * 0.92);
    el.style.fontSize = size + 'px';
  }
}

function renderCard(preserveReveal) {
  if (!deck.length) {
    document.getElementById("wordViet").textContent = "—";
    document.getElementById("wordEn").textContent   = "no words match filter";
    document.getElementById("wordViet").style.fontSize = '';
    document.getElementById("wordEn").style.fontSize   = '';
    document.getElementById("wordEn").classList.remove("hidden");
    document.getElementById("counter").textContent  = "0 / 0";
    revealed = true;
    renderBattery();
    return;
  }

  if (!preserveReveal) revealed = false;

  const w      = words[deck[deckPos]];
  const topEl  = document.getElementById("wordViet");
  const botEl  = document.getElementById("wordEn");

  function makeSegs(el, segs) {
    el.innerHTML = '';
    segs.forEach((seg, i) => {
      if (i > 0) el.appendChild(document.createTextNode(' '));
      const span = document.createElement('span');
      span.className       = 'seg';
      span.dataset.meaning = seg.meaning;
      span.textContent     = seg.text;
      el.appendChild(span);
    });
  }

  const vietSegs = (classifiersOn && w.classifier) ? [classifierSeg(w.classifier), ...getDisplaySegs(w)] : getDisplaySegs(w);

  if (reverseMode) {
    // E→V: top = English (plain, no hover), bottom = Vietnamese segs (answer)
    topEl.innerHTML    = '';
    topEl.textContent  = w.en;
    makeSegs(botEl, vietSegs);
  } else {
    // V→E: top = Vietnamese segs, bottom = English (answer)
    makeSegs(topEl, vietSegs);
    botEl.innerHTML   = '';
    botEl.textContent = w.en;
  }

  fitWordEl(topEl);
  fitWordEl(botEl);
  botEl.classList.toggle("hidden", !revealed);
  document.getElementById("counter").textContent = `${deckPos + 1} / ${deck.length}`;
  renderBattery();
  updateRegionDots();
  updateFormalityDots();
}

function reveal() { document.getElementById("wordEn").classList.remove("hidden"); revealed = true; }
function next() {
  if (!deck.length) return;
  filterDeckInPlace();
  if (!deck.length) { renderCard(); return; }
  deckPos = (deckPos + 1) % deck.length;
  renderCard();
}
function prev() {
  if (!deck.length) return;
  filterDeckInPlace();
  if (!deck.length) { renderCard(); return; }
  deckPos = (deckPos - 1 + deck.length) % deck.length;
  renderCard();
}
function revealOrNext() { if (!revealed) reveal(); else next(); }
// Click left half of the card → previous word (no answer); right half → reveal/advance.
// Taps on a word segment are ignored here — they lock/unlock the tooltip instead
// (essential on touch screens, where there's no hover).
function handleCardClick(e) {
  if (e && e.target.closest('.seg')) return;
  const rect = document.getElementById("card").getBoundingClientRect();
  if (e && (e.clientX - rect.left) < rect.width / 2) prev();
  else revealOrNext();
}
function handleNext()  { next(); }
function handlePrev()  { prev(); }

// ─── classifier ───────────────────────────────────────────────────────────────
function applyClassifierUI() {
  const label = classifiersOn ? "Classifier On" : "Classifier Off";
  document.getElementById("clsBtn").textContent   = label;
  document.getElementById("wlClsBtn").textContent = label;
}

function toggleClassifiers() {
  classifiersOn = !classifiersOn;
  applyClassifierUI();
  renderCard(true); // preserve revealed state
}

function toggleClassifiersFromList() {
  toggleClassifiers();
  renderWordListRows();
}

// ─── direction ────────────────────────────────────────────────────────────────
function toggleDirection() {
  reverseMode = !reverseMode;
  const label = reverseMode ? 'E → V' : 'V → E';
  document.getElementById('dirBtn').textContent = label;
  const wlBtn = document.getElementById('wlDirBtn');
  if (wlBtn) wlBtn.textContent = label;
  rebuildDeck(false); // re-evaluate filter with new direction's scores
  renderCard();
  if (document.getElementById('wlOverlay').classList.contains('visible')) renderWordListRows();
}

// ─── region / formality ───────────────────────────────────────────────────────
function variantForMode(w, region, formality) {
  if (formality === 'informal') {
    const rk = region + '_informal';
    if (w[rk]      !== undefined) return w[rk];
    if (w.informal !== undefined) return w.informal;
  }
  if (w[region] !== undefined) return w[region];
  return w.viet;
}

function displayViet(w) { return variantForMode(w, currentRegion, currentFormality); }

// Classifiers can vary by region (e.g. fruit/round: quả Northern / trái Southern).
function classifierText(cls) {
  if (!cls) return '';
  if (currentRegion === 'south'   && cls.south   !== undefined) return cls.south;
  if (currentRegion === 'central' && cls.central !== undefined) return cls.central;
  return cls.text;
}
function classifierSeg(cls) { return { text: classifierText(cls), meaning: cls.meaning }; }

function getDisplaySegs(w) {
  const variant = displayViet(w);
  if (variant !== w.viet) {
    const segKey = currentRegion + '_segments';
    return w[segKey] || [{text: variant, meaning: w.en}];
  }
  return w.segments;
}

function setRegion(r) {
  currentRegion = r;
  try { localStorage.setItem("viet-v1-region", r); } catch(e) {}
  applyRegionUI();
  renderCard(true); // preserve revealed state
  if (document.getElementById('wlOverlay').classList.contains('visible')) renderWordListRows();
}

function setFormality(f) {
  currentFormality = f;
  try { localStorage.setItem("viet-v1-formality", f); } catch(e) {}
  applyFormalityUI();
  renderCard(true); // preserve revealed state
  if (document.getElementById('wlOverlay').classList.contains('visible')) renderWordListRows();
}

function applyRegionUI() {
  const regions = ['north','central','south'];
  const sfx     = ['N','C','S'];
  regions.forEach((r, i) => {
    const s  = sfx[i];
    const m  = document.getElementById('region' + s);
    const wl = document.getElementById('wlRegion' + s);
    const on = r === currentRegion;
    if (m)  m.classList.toggle('active', on);
    if (wl) wl.classList.toggle('active', on);
  });
  updateRegionDots();
}

function applyFormalityUI() {
  ['formal','informal'].forEach(f => {
    const s  = f === 'formal' ? 'F' : 'I';
    const m  = document.getElementById('formal' + s);
    const wl = document.getElementById('wlFormal' + s);
    const on = f === currentFormality;
    if (m)  m.classList.toggle('active', on);
    if (wl) wl.classList.toggle('active', on);
  });
  updateFormalityDots();
}

function updateRegionDots() {
  if (!deck.length) {
    ['N','C','S'].forEach(s => {
      ['dot','wlDot'].forEach(p => { const d = document.getElementById(p + s); if (d) d.classList.remove('visible'); });
    });
    return;
  }
  const w   = words[deck[deckPos]];
  const cur = displayViet(w);
  ['north','central','south'].forEach((r, i) => {
    const s    = ['N','C','S'][i];
    const diff = r !== currentRegion && variantForMode(w, r, currentFormality) !== cur;
    ['dot','wlDot'].forEach(p => { const d = document.getElementById(p + s); if (d) d.classList.toggle('visible', diff); });
  });
}

function updateFormalityDots() {
  if (!deck.length) {
    ['Formal','Informal'].forEach(k => {
      ['dot','wlDot'].forEach(p => { const d = document.getElementById(p + k); if (d) d.classList.remove('visible'); });
    });
    return;
  }
  const w   = words[deck[deckPos]];
  const cur = displayViet(w);
  ['formal','informal'].forEach(f => {
    const k    = f === 'formal' ? 'Formal' : 'Informal';
    const diff = f !== currentFormality && variantForMode(w, currentRegion, f) !== cur;
    ['dot','wlDot'].forEach(p => { const d = document.getElementById(p + k); if (d) d.classList.toggle('visible', diff); });
  });
}

// ─── slider filter ────────────────────────────────────────────────────────────
function updateSlider() {
  const pct  = v => (v / 5) * 100;
  const lo = Math.min(scoreA, scoreB);
  const hi = Math.max(scoreA, scoreB);
  const fill = document.getElementById('sliderFill');
  fill.style.left  = pct(lo) + '%';
  fill.style.width = (pct(hi) - pct(lo)) + '%';
  document.getElementById('sliderLabel').textContent = lo + ' – ' + hi;
  // A is always on top — no z-index juggling
  document.getElementById('sliderMin').style.zIndex = 5;
  document.getElementById('sliderMax').style.zIndex = 4;
}

function onFilterChange() {
  deckFilter = new Set();
  const lo = Math.min(scoreA, scoreB);
  const hi = Math.max(scoreA, scoreB);
  for (let i = lo; i <= hi; i++) deckFilter.add(i);
  updateSlider();
  rebuildDeck(false);
  renderCard();
  saveFilter();
}

(function initSlider() {
  const aEl = document.getElementById('sliderMin');
  const bEl = document.getElementById('sliderMax');
  aEl.addEventListener('input', function() {
    scoreA = parseInt(this.value);
    onFilterChange();
  });
  bEl.addEventListener('input', function() {
    scoreB = parseInt(this.value);
    onFilterChange();
  });
})();

// ─── sort ─────────────────────────────────────────────────────────────────────
function updateSortUI() {
  const map = {
    'alpha-viet': { hdrId:'hdrViet',    arrowId:'sortVietArrow',  isDesc: false },
    'alpha-en':   { hdrId:'hdrEn',      arrowId:'sortEnArrow',    isDesc: false },
    'score':      { hdrId:'hdrScore',   arrowId:'sortScoreArrow', isDesc: true  },
    'score-cls':  { hdrId:'hdrScoreCls',arrowId:'sortCLSArrow',   isDesc: true  },
  };
  Object.entries(map).forEach(([key, {hdrId, arrowId, isDesc}]) => {
    const hdr   = document.getElementById(hdrId);
    const arrow = document.getElementById(arrowId);
    if (!hdr || !arrow) return;
    const active = sortPrimary === key;
    hdr.classList.toggle('primary', active);
    if (active) {
      const d = sortDirs[key];
      arrow.textContent = (isDesc ? d === 'desc' : d === 'asc') ? '↓' : '↑';
    } else {
      arrow.textContent = '';
    }
  });
}

function buildSortedList() {
  function cmpBy(a, b, key) {
    if (key === 'score')      return scoreOf(a, false) - scoreOf(b, false);
    if (key === 'score-cls')  return scoreOf(a, true)  - scoreOf(b, true);
    if (key === 'alpha-viet') {
      const va = (classifiersOn && a.classifier ? classifierText(a.classifier) + ' ' : '') + displayViet(a);
      const vb = (classifiersOn && b.classifier ? classifierText(b.classifier) + ' ' : '') + displayViet(b);
      return va.localeCompare(vb, 'vi');
    }
    if (key === 'alpha-en') return a.en.localeCompare(b.en);
    return 0;
  }
  const d = sortDirs[sortPrimary];
  cachedList = [...words].sort((a, b) => {
    let c = cmpBy(a, b, sortPrimary);
    return d === 'desc' ? -c : c;
  });
}

function clickSort(key) {
  if (sortPrimary !== key) {
    sortPrimary = key;
    sortDirs[key] = (key === 'score' || key === 'score-cls') ? 'desc' : 'asc';
  } else {
    const cur = sortDirs[key];
    sortDirs[key] = cur === 'desc' ? 'asc' : 'desc';
  }
  updateSortUI();
  buildSortedList();
  renderWordListRows();
}

// ─── word list ────────────────────────────────────────────────────────────────

function setScoreForWordInList(w, isCls, v) {
  v = ((v % 6) + 6) % 6;
  const key = scoreKey(w, isCls);
  scores[key] = v;
  saveScores();
  if (deck.length && words[deck[deckPos]] === w) renderBattery();
  renderWordListRows();
}

function toggleLinkForWord(w, e) {
  e.stopPropagation();
  if (!applyLinkToggle(w)) return;
  if (deck.length && words[deck[deckPos]] === w) renderBattery();
  renderWordListRows();
}

function makeMiniHBat(w, isCls) {
  const disabled = isCls && !w.classifier;
  const s   = scoreOf(w, isCls);
  const col = s > 0 ? batColor(s) : null;

  const wrap = document.createElement('div');
  wrap.className = 'mini-bat-h';
  if (disabled) wrap.style.opacity = '0.25';

  const body = document.createElement('div');
  body.className = 'mini-bat-body-h';
  body.style.borderColor = (col && !disabled) ? col.hi : 'rgba(255,255,255,0.14)';

  for (let i = 1; i <= 5; i++) {
    const cell = document.createElement('div');
    const lit  = i <= s;
    const cls  = lit ? litClass(s) : '';
    cell.className = 'mini-bat-cell-h' + (cls ? ' ' + cls : '');
    if (!disabled) {
      const sv = i;
      cell.onclick = (e) => { e.stopPropagation(); setScoreForWordInList(w, isCls, s === sv ? 0 : sv); };
    }
    body.appendChild(cell);
  }

  const cap = document.createElement('div');
  cap.className = 'mini-bat-cap-h';
  cap.style.background = (col && !disabled) ? col.hi : 'rgba(255,255,255,0.12)';

  wrap.appendChild(body);
  wrap.appendChild(cap);
  return wrap;
}

function renderWordListRows() {
  const content = document.getElementById('wlContent');
  content.innerHTML = '';
  cachedList.forEach(w => {
    const row = document.createElement('div');
    row.className = 'word-row';

    const viet = document.createElement('span');
    viet.className   = 'word-row-viet';
    viet.textContent = (classifiersOn && w.classifier) ? classifierText(w.classifier) + ' ' + displayViet(w) : displayViet(w);

    const en = document.createElement('span');
    en.className   = 'word-row-en';
    en.textContent = w.en;

    const linkBtn = document.createElement('button');
    linkBtn.className = 'wl-link-btn';
    linkBtn.innerHTML = isLinked(w) ? SVG_LINK : SVG_UNLINK;
    if (!w.classifier) linkBtn.disabled = true;
    else linkBtn.onclick = (e) => toggleLinkForWord(w, e);

    row.appendChild(viet);
    row.appendChild(en);
    row.appendChild(makeMiniHBat(w, false));
    row.appendChild(linkBtn);
    row.appendChild(makeMiniHBat(w, true));

    row.onclick = () => {
      const wordIdx = words.indexOf(w);
      let pos = deck.indexOf(wordIdx);
      if (pos < 0) {
        scoreA = 0; scoreB = 5;
        deckFilter = new Set([0,1,2,3,4,5]);
        document.getElementById('sliderMin').value = 0;
        document.getElementById('sliderMax').value = 5;
        updateSlider();
        rebuildDeck(false);
        pos = deck.indexOf(wordIdx);
      }
      deckPos = pos >= 0 ? pos : 0;
      renderCard();
      hideWordList();
    };
    content.appendChild(row);
  });
}

function exportBackup() {
  function q(s) { return `"${String(s).replace(/"/g, '""')}"` }
  const rows = ["Vietnamese,English,Classifier,Segments (hover),V→E,V→E w/cls,E→V,E→V w/cls,unlinked"];
  words.forEach(w => {
    const cls  = w.classifier ? w.classifier.text : "";
    const segs = w.segments.map(s => s.meaning).join(" | ");
    const def  = w.defaultScore ?? 0;
    const unl  = unlinkedWords.has(w.viet);
    const ve   = scores[w.viet]         ?? def;
    const vc   = scores[w.viet + "_c"]  ?? def;
    const ev   = scores[w.viet + "_r"]  ?? def;
    const evc  = scores[w.viet + "_rc"] ?? def;
    rows.push(`${q(w.viet)},${q(w.en)},${cls},${q(segs)},${ve},${unl?vc:ve},${ev},${unl?evc:ev},${unl?1:0}`);
  });
  const blob = new Blob([rows.join("\n")], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "vietnamese_backup.csv";
  a.click();
}

function importBackup() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".csv";
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        _applyCSVBackup(ev.target.result);
      } catch(err) {
        alert("Import failed: " + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Parse one CSV line, honoring quoted fields and "" escapes.
function parseCSVLine(line) {
  const fields = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { fields.push(cur); cur = ""; }
    else cur += ch;
  }
  fields.push(cur);
  return fields;
}

function _applyCSVBackup(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return;
  const header  = parseCSVLine(lines[0]);
  const iVE     = header.findIndex(h => h.includes("V→E") && !h.includes("cls") && !h.includes("w/"));
  const iVE_c   = header.findIndex(h => h.includes("V→E") && (h.includes("cls") || h.includes("w/")));
  const iEV     = header.findIndex(h => h.includes("E→V") && !h.includes("cls") && !h.includes("w/"));
  const iEV_c   = header.findIndex(h => h.includes("E→V") && (h.includes("cls") || h.includes("w/")));
  const iUnlink = header.findIndex(h => h.includes("unlinked"));
  const iBase   = iVE >= 0 ? iVE : 3;
  const iCls    = iVE_c >= 0 ? iVE_c : 4;
  const newUnlinked = new Set(unlinkedWords);
  lines.slice(1).forEach(line => {
    const fields = parseCSVLine(line);
    const viet = fields[0]; if (!viet) return;
    const ve   = parseInt(fields[iBase]) || 0;
    const vc   = parseInt(fields[iCls])  || 0;
    const ev   = iEV   >= 0 ? (parseInt(fields[iEV])   || 0) : ve;
    const evc  = iEV_c >= 0 ? (parseInt(fields[iEV_c]) || 0) : vc;
    const unlk = iUnlink >= 0 ? fields[iUnlink] === "1" : ve !== vc;
    scores[viet]         = ve;
    scores[viet + "_c"]  = vc;
    scores[viet + "_r"]  = ev;
    scores[viet + "_rc"] = evc;
    if (unlk) newUnlinked.add(viet); else newUnlinked.delete(viet);
  });
  unlinkedWords = newUnlinked;
  saveScores();
  saveUnlinked();
  _finishImport("Scores imported!");
}

function _finishImport(msg) {
  rebuildDeck(false);
  buildSortedList();
  renderCard();
  if (document.getElementById('wlOverlay').classList.contains('visible')) renderWordListRows();
  const btn = document.getElementById('clsBtn');
  const old = btn.textContent;
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = old; }, 1800);
}

function showWordList() {
  buildSortedList();
  updateSortUI();
  renderWordListRows();
  document.getElementById('wlOverlay').classList.add('visible');
}

function hideWordList() {
  document.getElementById('wlOverlay').classList.remove('visible');
  rebuildDeck(false);
  renderCard();
}

// ─── tooltip ──────────────────────────────────────────────────────────────────
(function() {
  const tip = document.createElement('div');
  tip.id = 'seg-tip';
  document.body.appendChild(tip);

  let lockedSeg = null;

  // Click: toggle locked (pinned below word)
  document.addEventListener('click', e => {
    const seg = e.target.closest('.seg');
    if (seg) {
      if (lockedSeg === seg) {
        lockedSeg = null;
        tip.classList.remove('visible', 'locked');
      } else {
        lockedSeg = seg;
        tip.textContent = seg.dataset.meaning;
        const rect = seg.getBoundingClientRect();
        tip.style.left = (rect.left + rect.width / 2) + 'px';
        tip.style.top  = rect.bottom + 'px';
        tip.classList.add('visible', 'locked');
      }
    } else if (lockedSeg) {
      lockedSeg = null;
      tip.classList.remove('visible', 'locked');
    }
  });

  // Hover: only when nothing is locked
  document.addEventListener('mouseover', e => {
    if (lockedSeg) return;
    const seg = e.target.closest('.seg');
    if (!seg) return;
    tip.textContent = seg.dataset.meaning;
    tip.classList.add('visible');
  });
  document.addEventListener('mousemove', e => {
    if (lockedSeg) return;
    if (!tip.classList.contains('visible')) return;
    tip.style.left = e.clientX + 'px';
    tip.style.top  = (e.clientY - 14) + 'px';
  });
  document.addEventListener('mouseout', e => {
    if (lockedSeg) return;
    if (e.target.closest('.seg')) tip.classList.remove('visible');
  });
})();

// ─── zoom (scroll wheel) ──────────────────────────────────────────────────────
function applyZoom() {
  const z = ZOOM_LEVELS[zoomIdx];
  document.getElementById("stage").style.transform = `scale(${z})`;
  try { localStorage.setItem("viet-v2-zoom", zoomIdx); } catch(e) {}
}

document.addEventListener('wheel', e => {
  if (document.getElementById('wlOverlay').classList.contains('visible')) return;
  e.preventDefault();
  if (e.deltaY < 0 && zoomIdx < ZOOM_LEVELS.length - 1) { zoomIdx++; applyZoom(); }
  else if (e.deltaY > 0 && zoomIdx > 0)                  { zoomIdx--; applyZoom(); }
}, { passive: false });

// ─── keyboard ─────────────────────────────────────────────────────────────────
const heldNavKeys = new Set();

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { hideWordList(); return; }
  if (document.getElementById('wlOverlay').classList.contains('visible')) return;

  switch (e.key) {
    case "c": case "C": toggleClassifiers(); break;
    case "l": case "L": toggleLink(); break;
    case "v": case "V": showWordList(); break;
    case "e": case "E": exportBackup(); break;
    case "i": case "I": importBackup(); break;
    case " ": case "Shift":
      e.preventDefault();
      if (heldNavKeys.has(e.key)) return;
      heldNavKeys.add(e.key);
      revealOrNext(); break;
    case "ArrowRight":
      if (heldNavKeys.has("ArrowRight")) return;
      heldNavKeys.add("ArrowRight"); handleNext(); break;
    case "ArrowLeft":
      if (heldNavKeys.has("ArrowLeft")) return;
      heldNavKeys.add("ArrowLeft"); handlePrev(); break;
    case "ArrowUp":
      e.preventDefault(); setScore(currentScore() + 1); break;
    case "ArrowDown":
      e.preventDefault(); setScore(currentScore() - 1); break;
  }
});

document.addEventListener("keyup", e => { heldNavKeys.delete(e.key); });
